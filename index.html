<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CityBay · Камеры</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 10% 20%, #0a0f1a, #05080f);
            font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Сетка камер */
        .camera-grid {
            max-width: 1600px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 24px;
        }

        .camera-card {
            background: rgba(12, 18, 32, 0.8);
            backdrop-filter: blur(6px);
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.12);
            transition: transform 0.2s ease, box-shadow 0.2s, border-color 0.2s;
            cursor: pointer;
        }

        .camera-card:hover {
            transform: translateY(-5px);
            background: rgba(22, 32, 55, 0.92);
            box-shadow: 0 28px 44px -18px black;
            border-color: rgba(100, 150, 255, 0.4);
        }

        .video-wrapper {
            position: relative;
            background: #000;
            width: 100%;
            padding-top: 56.25%;
            overflow: hidden;
        }

        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #010101;
            pointer-events: auto;
        }

        .cam-info {
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.2));
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        .cam-title {
            font-weight: 600;
            font-size: 0.9rem;
            color: #f0f5ff;
        }

        .fullscreen-badge {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 40px;
            padding: 4px 10px;
            font-size: 0.65rem;
            font-weight: 500;
            color: #bbdbff;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .fullscreen-badge::after {
            content: "⛶";
            font-size: 0.9rem;
        }

        .video-status {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 20px;
            padding: 3px 10px;
            font-size: 0.65rem;
            font-weight: 500;
            font-family: monospace;
            backdrop-filter: blur(4px);
            z-index: 12;
            pointer-events: none;
        }

        .status-live {
            color: #6effb0;
            text-shadow: 0 0 2px #00aa55;
        }

        .status-buffering {
            color: #ffd966;
        }

        .status-error {
            color: #ff9f8e;
        }

        .loading-spinner {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 28px;
            height: 28px;
            margin: -14px 0 0 -14px;
            border: 2px solid rgba(255, 255, 255, 0.25);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 0.85s linear infinite;
            z-index: 10;
            pointer-events: none;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== ИМИТАЦИЯ ПОЛНОЭКРАННОГО РЕЖИМА (РАБОТАЕТ ЗУМ) ===== */
        .fullscreen-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            touch-action: pinch-zoom;
            overflow: auto;
            -webkit-overflow-scrolling: touch;
        }

        .fullscreen-video-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: auto;
            -webkit-overflow-scrolling: touch;
            touch-action: pinch-zoom;
        }

        .fullscreen-video-container video {
            position: relative;
            width: 100%;
            height: auto;
            max-height: 100%;
            object-fit: contain;
            transform-origin: center center;
        }

        .fullscreen-exit-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10001;
            transition: all 0.2s ease;
            font-size: 26px;
            color: white;
            font-weight: bold;
        }

        .fullscreen-exit-btn:hover {
            background: rgba(200, 50, 50, 0.9);
            transform: scale(1.05);
        }

        .fullscreen-title {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(12px);
            padding: 8px 16px;
            border-radius: 40px;
            color: white;
            font-size: 0.9rem;
            font-weight: 500;
            z-index: 10001;
            pointer-events: none;
        }

        .zoom-hint-full {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(12px);
            padding: 6px 16px;
            border-radius: 40px;
            color: #ccc;
            font-size: 0.7rem;
            z-index: 10001;
            pointer-events: none;
            white-space: nowrap;
        }

        @media (max-width: 760px) {
            .camera-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            body {
                padding: 16px;
            }
            .fullscreen-exit-btn {
                top: 12px;
                right: 12px;
                width: 44px;
                height: 44px;
                font-size: 22px;
            }
            .fullscreen-title {
                top: 12px;
                left: 12px;
                font-size: 0.75rem;
                padding: 6px 12px;
            }
            .zoom-hint-full {
                font-size: 0.6rem;
                bottom: 12px;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.8/dist/hls.min.js"></script>
</head>
<body>
    <div class="camera-grid" id="cameraGrid"></div>

<script>
    // ==================== ВСЕ ПОТОКИ ====================
    const STREAMS = [
        "https://rtsp2.videocam.online/live/CityBay2.stream/playlist.m3u8",
        "https://rtsp2.videocam.online/live/CityBay3.stream/playlist.m3u8",
        "https://rtsp2.videocam.online/live/CityBay4.stream/playlist.m3u8",
        "https://rtsp2.videocam.online/live/CityBay5.stream/playlist.m3u8",
        "https://rtsp2.videocam.online/live/CityBay6.stream/playlist.m3u8",
        "https://rtsp2.videocam.online/live/CityBay7.stream/playlist.m3u8",
        "https://rtsp2.videocam.online/live/CityBay8.stream/playlist.m3u8",
        "https://rtsp2.videocam.online/live/CityBay9.stream/playlist.m3u8",
        "https://rtsp2.videocam.online/live/CityBay10.stream/playlist.m3u8",
        "https://rtsp2.videocam.online/live/CityBay11.stream/playlist.m3u8",
        "https://rtsp2.videocam.online/live/CityBay12.stream/playlist.m3u8",
        "https://rtsp2.videocam.online/live/CityBay13.stream/playlist.m3u8",
        "https://rtsp2.videocam.online/live/CityBay14.stream/playlist.m3u8"
    ];

    function getCameraTitle(url) {
        const match = url.match(/CityBay(\d+)\.stream/);
        return match ? `CityBay ${match[1]}` : "Live Camera";
    }

    // ==================== HLS И АВТОЗАПУСК ====================
    const videoRegistry = new Map();

    function updateStatus(statusSpan, text, type = 'buffering') {
        if (!statusSpan) return;
        statusSpan.innerText = text;
        statusSpan.classList.remove('status-live', 'status-buffering', 'status-error');
        if (type === 'live') statusSpan.classList.add('status-live');
        else if (type === 'error') statusSpan.classList.add('status-error');
        else statusSpan.classList.add('status-buffering');
    }

    async function attemptPlayWithRetry(video, maxRetries = 5, baseDelay = 1000, statusSpan, spinner) {
        video.muted = true;
        for (let attempt = 1; attempt <= maxRetries; attempt++) {
            try {
                await video.play();
                updateStatus(statusSpan, "● LIVE", "live");
                if (spinner) spinner.style.display = 'none';
                return true;
            } catch (err) {
                if (attempt < maxRetries) {
                    const delay = baseDelay * attempt;
                    updateStatus(statusSpan, `Попытка ${attempt}/${maxRetries}...`, "buffering");
                    await new Promise(r => setTimeout(r, delay));
                } else {
                    updateStatus(statusSpan, "Автозапуск не удался", "error");
                    if (spinner) spinner.style.display = 'none';
                    return false;
                }
            }
        }
        return false;
    }

    function initHLS(video, streamUrl, statusSpan, spinner) {
        if (video.hlsInstance) {
            try { video.hlsInstance.destroy(); } catch(e) {}
            video.hlsInstance = null;
        }
        video.removeAttribute('src');
        
        const showSpinner = (show) => {
            if (spinner) spinner.style.display = show ? 'block' : 'none';
        };
        
        showSpinner(true);
        updateStatus(statusSpan, "Подключение...", "buffering");
        
        let playAttempted = false;
        const startPlayback = async () => {
            if (playAttempted) return;
            playAttempted = true;
            showSpinner(false);
            await attemptPlayWithRetry(video, 5, 1000, statusSpan, spinner);
        };
        
        if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = streamUrl;
            video.addEventListener('loadedmetadata', () => startPlayback());
            video.addEventListener('error', () => {
                if (!playAttempted) updateStatus(statusSpan, "Ошибка потока", "error");
                showSpinner(false);
            });
        } 
        else if (Hls.isSupported()) {
            const hls = new Hls({
                debug: false,
                enableWorker: true,
                lowLatencyMode: true,
                maxBufferLength: 30,
                manifestLoadingTimeOut: 10000,
                levelLoadingTimeOut: 8000,
            });
            video.hlsInstance = hls;
            hls.loadSource(streamUrl);
            hls.attachMedia(video);
            
            let manifestReady = false;
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                manifestReady = true;
                showSpinner(false);
                startPlayback();
            });
            
            hls.on(Hls.Events.ERROR, (event, data) => {
                if (data.fatal) {
                    if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
                        updateStatus(statusSpan, "Сеть", "error");
                        setTimeout(() => {
                            if (video.hlsInstance) {
                                video.hlsInstance.startLoad();
                                if (video.paused && !playAttempted) startPlayback();
                            }
                        }, 5000);
                    } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
                        updateStatus(statusSpan, "Медиа", "error");
                        hls.recoverMediaError();
                    }
                    showSpinner(false);
                } else {
                    if (!manifestReady) updateStatus(statusSpan, "Загрузка...", "buffering");
                }
            });
        } else {
            updateStatus(statusSpan, "HLS не поддержан", "error");
            showSpinner(false);
        }
        
        videoRegistry.set(video, { hls: video.hlsInstance, statusSpan, spinner, streamUrl });
    }

    // ==================== ИМИТАЦИЯ ПОЛНОЭКРАННОГО РЕЖИМА ====================
    function enterFullscreen(videoElement, title) {
        // Создаём оверлей
        const overlay = document.createElement('div');
        overlay.className = 'fullscreen-overlay';
        
        const container = document.createElement('div');
        container.className = 'fullscreen-video-container';
        
        // Клонируем видео (чтобы не отрывать от исходного места)
        const clonedVideo = videoElement.cloneNode(true);
        clonedVideo.setAttribute('playsinline', 'true');
        clonedVideo.setAttribute('autoplay', 'true');
        clonedVideo.muted = false;
        
        // Переносим поток из исходного видео в клон
        if (videoElement.hlsInstance) {
            // Копируем HLS настройки
            const originalSrc = videoElement.hlsInstance.url;
            if (Hls.isSupported()) {
                const newHls = new Hls({
                    debug: false,
                    enableWorker: true,
                    lowLatencyMode: true,
                });
                newHls.loadSource(originalSrc);
                newHls.attachMedia(clonedVideo);
                clonedVideo.hlsInstance = newHls;
            }
        } else if (videoElement.src) {
            clonedVideo.src = videoElement.src;
        }
        
        // Запускаем клон
        clonedVideo.play().catch(e => console.log("play in fullscreen", e));
        
        container.appendChild(clonedVideo);
        overlay.appendChild(container);
        
        // Кнопка выхода
        const exitBtn = document.createElement('div');
        exitBtn.className = 'fullscreen-exit-btn';
        exitBtn.innerHTML = '✕';
        exitBtn.onclick = () => {
            if (clonedVideo.hlsInstance) {
                clonedVideo.hlsInstance.destroy();
            }
            overlay.remove();
            document.body.style.overflow = '';
        };
        overlay.appendChild(exitBtn);
        
        // Заголовок
        const titleDiv = document.createElement('div');
        titleDiv.className = 'fullscreen-title';
        titleDiv.innerText = title;
        overlay.appendChild(titleDiv);
        
        // Подсказка
        const hint = document.createElement('div');
        hint.className = 'zoom-hint-full';
        hint.innerText = '🔍 Два пальца — масштабирование и перемещение';
        overlay.appendChild(hint);
        
        document.body.appendChild(overlay);
        document.body.style.overflow = 'hidden';
        
        // Блокируем скролл на overlay
        overlay.addEventListener('touchmove', (e) => {
            // Разрешаем скролл только внутри контейнера с видео (для зума)
            if (e.target === overlay && !container.contains(e.target)) {
                e.preventDefault();
            }
        }, { passive: false });
    }

    // ==================== СОЗДАНИЕ КАРТОЧКИ ====================
    function createCameraCard(streamUrl, idx) {
        const card = document.createElement('div');
        card.className = 'camera-card';
        card.dataset.idx = idx;
        
        const videoWrapper = document.createElement('div');
        videoWrapper.className = 'video-wrapper';
        
        const video = document.createElement('video');
        video.setAttribute('playsinline', 'true');
        video.setAttribute('preload', 'auto');
        video.setAttribute('autoplay', 'true');
        video.setAttribute('muted', 'true');
        video.controls = false;
        
        const spinner = document.createElement('div');
        spinner.className = 'loading-spinner';
        
        const statusSpan = document.createElement('div');
        statusSpan.className = 'video-status';
        statusSpan.innerText = "Старт...";
        
        videoWrapper.appendChild(video);
        videoWrapper.appendChild(spinner);
        videoWrapper.appendChild(statusSpan);
        
        const camInfo = document.createElement('div');
        camInfo.className = 'cam-info';
        const titleSpan = document.createElement('span');
        titleSpan.className = 'cam-title';
        const camTitle = getCameraTitle(streamUrl);
        titleSpan.innerText = camTitle;
        
        const fsBadge = document.createElement('span');
        fsBadge.className = 'fullscreen-badge';
        fsBadge.innerText = 'Во весь экран';
        
        camInfo.appendChild(titleSpan);
        camInfo.appendChild(fsBadge);
        card.appendChild(videoWrapper);
        card.appendChild(camInfo);
        
        initHLS(video, streamUrl, statusSpan, spinner);
        
        // Клик по карточке: открываем в полноэкранном режиме (имитация)
        const onCardClick = (e) => {
            e.stopPropagation();
            enterFullscreen(video, camTitle);
        };
        card.addEventListener('click', onCardClick);
        
        return card;
    }
    
    function renderGrid() {
        const grid = document.getElementById('cameraGrid');
        if (!grid) return;
        grid.innerHTML = '';
        STREAMS.forEach((url, i) => {
            const card = createCameraCard(url, i);
            grid.appendChild(card);
        });
    }
    
    // ==================== ЗАПУСК ====================
    document.addEventListener('DOMContentLoaded', () => {
        renderGrid();
    });
</script>
</body>
</html>
