<html lang="ru">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CityBay · Камеры</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 10% 20%, #0a0f1a, #05080f);
            font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .camera-grid {
            max-width: 1600px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 24px;
        }

        .camera-card {
            background: rgba(12, 18, 32, 0.8);
            backdrop-filter: blur(6px);
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.12);
            transition: transform 0.2s ease, box-shadow 0.2s, border-color 0.2s;
            cursor: pointer;
        }

            .camera-card:hover {
                transform: translateY(-5px);
                background: rgba(22, 32, 55, 0.92);
                box-shadow: 0 28px 44px -18px black;
                border-color: rgba(100, 150, 255, 0.4);
            }

        .video-wrapper {
            position: relative;
            background: #000;
            width: 100%;
            padding-top: 56.25%;
            overflow: hidden;
        }

        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #010101;
            pointer-events: auto;
        }

        .cam-info {
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.2));
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        .cam-title {
            font-weight: 600;
            font-size: 0.9rem;
            color: #f0f5ff;
        }

        .fullscreen-badge {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 40px;
            padding: 4px 10px;
            font-size: 0.65rem;
            font-weight: 500;
            color: #bbdbff;
            display: flex;
            align-items: center;
            gap: 6px;
        }

            .fullscreen-badge::after {
                content: "⛶";
                font-size: 0.9rem;
            }

        .video-status {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 20px;
            padding: 3px 10px;
            font-size: 0.65rem;
            font-weight: 500;
            font-family: monospace;
            backdrop-filter: blur(4px);
            z-index: 12;
            pointer-events: none;
        }

        .status-live {
            color: #6effb0;
            text-shadow: 0 0 2px #00aa55;
        }

        .status-buffering {
            color: #ffd966;
        }

        .status-error {
            color: #ff9f8e;
        }

        .loading-spinner {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 28px;
            height: 28px;
            margin: -14px 0 0 -14px;
            border: 2px solid rgba(255, 255, 255, 0.25);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 0.85s linear infinite;
            z-index: 10;
            pointer-events: none;
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Полноэкранный оверлей */
        .fullscreen-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .fullscreen-video-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .fullscreen-video {
            position: relative;
            width: 100%;
            height: auto;
            max-height: 100%;
            object-fit: contain;
            cursor: default;
            transform-origin: center center;
        }

            .fullscreen-video[data-zoomed="true"]:active {
                cursor: grabbing;
            }

        .fullscreen-exit-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10001;
            transition: all 0.2s ease;
            font-size: 20px;
            color: white;
            font-weight: bold;
        }

            .fullscreen-exit-btn:hover {
                background: rgba(200, 50, 50, 0.9);
                transform: scale(1.05);
            }

        .fullscreen-title {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(12px);
            padding: 8px 16px;
            border-radius: 40px;
            color: white;
            font-size: 0.9rem;
            font-weight: 500;
            z-index: 10001;
            pointer-events: none;
        }

        .fullscreen-statusbar {
            position: fixed;
            bottom: 24px;
            left: 24px;
            display: flex;
            gap: 12px;
            z-index: 10001;
            pointer-events: none;
        }

        .fullscreen-statusbar .video-status {
            position: static;
            bottom: auto;
            left: auto;
            font-size: 1rem;
            padding: 7px 16px;
            border-radius: 40px;
            letter-spacing: 0.02em;
        }

        .video-zoom {
            color: #bbdbff;
        }

        @media (max-width: 760px) {
            .fullscreen-statusbar {
                bottom: 16px;
                left: 16px;
                gap: 8px;
            }

            .fullscreen-statusbar .video-status {
                font-size: 0.8rem;
                padding: 5px 12px;
            }
        }

        @media (max-width: 760px) {
            .camera-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            body {
                padding: 16px;
            }

            .fullscreen-exit-btn {
                top: 12px;
                right: 12px;
                width: 36px;
                height: 36px;
                font-size: 18px;
            }

            .fullscreen-title {
                top: 12px;
                left: 12px;
                font-size: 0.75rem;
                padding: 6px 12px;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.8/dist/hls.min.js"></script>
</head>
<body>
    <div class="camera-grid" id="cameraGrid"></div>

<script>
    // ==================== ВСЕ ПОТОКИ (14 камер) ====================
    const STREAMS = [
        "https://rtsp2.videocam.online/live/CityBay.stream/playlist.m3u8",
        "https://rtsp2.videocam.online/live/CityBay2.stream/playlist.m3u8",
        "https://rtsp2.videocam.online/live/CityBay3.stream/playlist.m3u8",
        "https://rtsp2.videocam.online/live/CityBay4.stream/playlist.m3u8",
        "https://rtsp2.videocam.online/live/CityBay5.stream/playlist.m3u8",
        "https://rtsp2.videocam.online/live/CityBay6.stream/playlist.m3u8",
        "https://rtsp2.videocam.online/live/CityBay7.stream/playlist.m3u8",
        "https://rtsp2.videocam.online/live/CityBay8.stream/playlist.m3u8",
        "https://rtsp2.videocam.online/live/CityBay9.stream/playlist.m3u8",
        "https://rtsp2.videocam.online/live/CityBay10.stream/playlist.m3u8",
        "https://rtsp2.videocam.online/live/CityBay11.stream/playlist.m3u8",
        "https://rtsp2.videocam.online/live/CityBay12.stream/playlist.m3u8",
        "https://rtsp2.videocam.online/live/CityBay13.stream/playlist.m3u8",
        "https://rtsp2.videocam.online/live/CityBay14.stream/playlist.m3u8"
    ];

    function getCameraTitle(url) {
        const match = url.match(/CityBay(\d*)\.stream/);
        if (match) {
            const num = match[1];
            return num ? `CityBay ${num}` : "CityBay 1";
        }
        return "Live Camera";
    }

    let currentFullscreenData = null;

    // ==================== HLS И АВТОЗАПУСК ====================
    const videoRegistry = new Map();

    function updateStatus(statusSpan, text, type = 'buffering') {
        if (!statusSpan) return;
        statusSpan.innerText = text;
        statusSpan.classList.remove('status-live', 'status-buffering', 'status-error');
        if (type === 'live') statusSpan.classList.add('status-live');
        else if (type === 'error') statusSpan.classList.add('status-error');
        else statusSpan.classList.add('status-buffering');
    }

    async function attemptPlayWithRetry(video, maxRetries = 5, baseDelay = 1000, statusSpan, spinner) {
        video.muted = true;
        for (let attempt = 1; attempt <= maxRetries; attempt++) {
            try {
                await video.play();
                updateStatus(statusSpan, "● LIVE", "live");
                if (spinner) spinner.style.display = 'none';
                return true;
            } catch (err) {
                if (attempt < maxRetries) {
                    const delay = baseDelay * attempt;
                    updateStatus(statusSpan, `Попытка ${attempt}/${maxRetries}...`, "buffering");
                    await new Promise(r => setTimeout(r, delay));
                } else {
                    updateStatus(statusSpan, "Автозапуск не удался", "error");
                    if (spinner) spinner.style.display = 'none';
                    return false;
                }
            }
        }
        return false;
    }

    function initHLS(video, streamUrl, statusSpan, spinner) {
        if (video.hlsInstance) {
            try { video.hlsInstance.destroy(); } catch(e) {}
            video.hlsInstance = null;
        }
        video.removeAttribute('src');
        
        const showSpinner = (show) => {
            if (spinner) spinner.style.display = show ? 'block' : 'none';
        };
        
        showSpinner(true);
        updateStatus(statusSpan, "Подключение...", "buffering");
        
        let playAttempted = false;
        const startPlayback = async () => {
            if (playAttempted) return;
            playAttempted = true;
            showSpinner(false);
            await attemptPlayWithRetry(video, 5, 1000, statusSpan, spinner);
        };
        
        if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = streamUrl;
            video.addEventListener('loadedmetadata', () => startPlayback());
            video.addEventListener('error', () => {
                if (!playAttempted) updateStatus(statusSpan, "Ошибка потока", "error");
                showSpinner(false);
            });
        } 
        else if (Hls.isSupported()) {
            const hls = new Hls({
                debug: false,
                enableWorker: true,
                lowLatencyMode: true,
                maxBufferLength: 30,
                manifestLoadingTimeOut: 10000,
                levelLoadingTimeOut: 8000,
            });
            video.hlsInstance = hls;
            hls.loadSource(streamUrl);
            hls.attachMedia(video);
            
            let manifestReady = false;
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                manifestReady = true;
                showSpinner(false);
                startPlayback();
            });
            
            hls.on(Hls.Events.ERROR, (event, data) => {
                if (data.fatal) {
                    if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
                        updateStatus(statusSpan, "Сеть", "error");
                        setTimeout(() => {
                            if (video.hlsInstance) {
                                video.hlsInstance.startLoad();
                                if (video.paused && !playAttempted) startPlayback();
                            }
                        }, 5000);
                    } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
                        updateStatus(statusSpan, "Медиа", "error");
                        hls.recoverMediaError();
                    }
                    showSpinner(false);
                } else {
                    if (!manifestReady) updateStatus(statusSpan, "Загрузка...", "buffering");
                }
            });
        } else {
            updateStatus(statusSpan, "HLS не поддержан", "error");
            showSpinner(false);
        }
        
        videoRegistry.set(video, { hls: video.hlsInstance, statusSpan, spinner, streamUrl });
    }

    // ==================== ПОЛНОЭКРАННЫЙ РЕЖИМ ====================
    function enterFullscreen(videoElement, title, originalWrapper) {
        if (currentFullscreenData) exitFullscreen();
        
        const overlay = document.createElement('div');
        overlay.className = 'fullscreen-overlay';
        const wrapper = document.createElement('div');
        wrapper.className = 'fullscreen-video-wrapper';
        
        // Перемещаем видео
        if (originalWrapper.parentNode) originalWrapper.removeChild(videoElement);
        wrapper.appendChild(videoElement);
        overlay.appendChild(wrapper);
        
        // Кнопка выхода
        const exitBtn = document.createElement('div');
        exitBtn.className = 'fullscreen-exit-btn';
        exitBtn.innerHTML = '✕';
        exitBtn.onclick = () => exitFullscreen();
        overlay.appendChild(exitBtn);
        
        const titleDiv = document.createElement('div');
        titleDiv.className = 'fullscreen-title';
        titleDiv.innerText = title;
        overlay.appendChild(titleDiv);
        
        // Нижняя статус-панель: Live (из карточки) + текущий уровень зума
        const statusBar = document.createElement('div');
        statusBar.className = 'fullscreen-statusbar';
        const statusSpan = originalWrapper.querySelector('.video-status');
        if (statusSpan && statusSpan.parentNode === originalWrapper) {
            originalWrapper.removeChild(statusSpan);
            statusBar.appendChild(statusSpan);
        }
        const zoomSpan = document.createElement('div');
        zoomSpan.className = 'video-status video-zoom';
        zoomSpan.innerText = 'Zoom x1';
        statusBar.appendChild(zoomSpan);
        overlay.appendChild(statusBar);
        
        document.body.appendChild(overlay);
        document.body.style.overflow = 'hidden';
        
        currentFullscreenData = { overlay, originalWrapper, video: videoElement, wrapper, statusSpan };
        
        // Сброс стилей видео для полноэкранного режима
        videoElement.classList.add('fullscreen-video');
        videoElement.style.position = 'relative';
        videoElement.style.width = '100%';
        videoElement.style.height = 'auto';
        videoElement.style.maxHeight = '100%';
        videoElement.style.objectFit = 'contain';
        videoElement.style.transform = 'scale(1)';
        videoElement.style.transformOrigin = 'center center';
        
        // Цель (куда едем) и отображаемое состояние (что нарисовано)
        let scale = 1, translateX = 0, translateY = 0;
        let curScale = 1, curTX = 0, curTY = 0;
        let dragging = false;
        let rafId = null;
        
        // Скорость догонки и шаг зума колесом
        const SMOOTH = 0.32;       // 0.25 мягче, 0.5 резче
        const ZOOM_STEP = 1.18;    // +18% за тик колеса
        
        function applyDisplayed() {
            videoElement.style.transform =
                `translate(${curTX}px, ${curTY}px) scale(${curScale})`;
        }
        
        function updateZoomLabel() {
            const r = Math.round(scale * 10) / 10;
            zoomSpan.innerText = `Zoom x${r}`;
        }
        
        function tick() {
            const ds = scale - curScale;
            const dx = translateX - curTX;
            const dy = translateY - curTY;
            if (Math.abs(ds) < 0.0005 && Math.abs(dx) < 0.3 && Math.abs(dy) < 0.3) {
                curScale = scale; curTX = translateX; curTY = translateY;
                applyDisplayed();
                rafId = null;
                return;
            }
            curScale += ds * SMOOTH;
            curTX    += dx * SMOOTH;
            curTY    += dy * SMOOTH;
            applyDisplayed();
            rafId = requestAnimationFrame(tick);
        }
        
        function requestTick() {
            if (rafId == null) rafId = requestAnimationFrame(tick);
        }
        
        // Мгновенная синхронизация (для драга — без сглаживания)
        function snap() {
            curScale = scale; curTX = translateX; curTY = translateY;
            applyDisplayed();
            if (rafId != null) { cancelAnimationFrame(rafId); rafId = null; }
        }
        
        // Клампим ЦЕЛЬ — рендер плавно подтянется
        function clamp() {
            if (scale <= 1) {
                scale = 1;
                translateX = 0;
                translateY = 0;
                videoElement.dataset.zoomed = '';
                updateZoomLabel();
                requestTick();
                return;
            }
            const baseW = videoElement.offsetWidth;
            const baseH = videoElement.offsetHeight;
            const wrapperRect = wrapper.getBoundingClientRect();
            const maxX = Math.max(0, (baseW * scale - wrapperRect.width) / 2);
            const maxY = Math.max(0, (baseH * scale - wrapperRect.height) / 2);
            translateX = Math.min(Math.max(translateX, -maxX), maxX);
            translateY = Math.min(Math.max(translateY, -maxY), maxY);
            // Курсором рулит CSS через [data-zoomed="true"]:active —
            // браузер мгновенно показывает `grabbing` в момент нажатия.
            videoElement.dataset.zoomed = 'true';
            updateZoomLabel();
            requestTick();
        }
        
        function reset() {
            scale = 1; translateX = 0; translateY = 0;
            videoElement.dataset.zoomed = '';
            updateZoomLabel();
            requestTick();
        }
        
        // ЗУМ КОЛЕСОМ относительно курсора (zoom-to-cursor)
        function onWheel(e) {
            e.preventDefault();
            const delta = e.deltaY > 0 ? (1 / ZOOM_STEP) : ZOOM_STEP;
            let newScale = scale * delta;
            newScale = Math.min(Math.max(newScale, 1), 10);
            if (newScale === scale) return;
            
            const ratio = newScale / scale;
            const wr = wrapper.getBoundingClientRect();
            const mx = e.clientX - (wr.left + wr.width / 2);
            const my = e.clientY - (wr.top  + wr.height / 2);
            
            // Формула гарантирует, что точка под курсором остаётся на месте
            translateX = mx * (1 - ratio) + translateX * ratio;
            translateY = my * (1 - ratio) + translateY * ratio;
            scale = newScale;
            clamp();
        }
        
        // ПЕРЕТАСКИВАНИЕ МЫШЬЮ
        let startX = 0, startY = 0;
        let startTX = 0, startTY = 0;
        let mouseDownActive = false;
        let mouseDownX = 0, mouseDownY = 0;
        const DRAG_THRESHOLD = 5; // px — порог различения клика и драга
        
        function onMouseDown(e) {
            if (e.button !== 0) return; // только левая кнопка
            if (scale <= 1) return;
            // НЕ включаем драг сразу и НЕ зовём preventDefault —
            // иначе ломается связка click → dblclick и срываются клики на возврат.
            // Курсор `grabbing` ставит CSS через [data-zoomed="true"]:active —
            // браузер обновит его мгновенно, без ожидания mousemove.
            mouseDownActive = true;
            mouseDownX = e.clientX;
            mouseDownY = e.clientY;
            startX = e.clientX;
            startY = e.clientY;
            startTX = translateX;
            startTY = translateY;
        }
        
        function onMouseMove(e) {
            if (!mouseDownActive) return;
            if (!dragging) {
                const dx = e.clientX - mouseDownX;
                const dy = e.clientY - mouseDownY;
                if (Math.hypot(dx, dy) < DRAG_THRESHOLD) return;
                dragging = true;
            }
            translateX = startTX + (e.clientX - startX);
            translateY = startTY + (e.clientY - startY);
            clamp();
            snap(); // драг — 1:1 без догонки
        }
        
        function onMouseUp(e) {
            if (!mouseDownActive) return;
            mouseDownActive = false;
            dragging = false;
        }
        
        // МОБИЛЬНЫЕ ЖЕСТЫ
        let initialPinch = 0;
        let isPan = false;
        let lastX = 0, lastY = 0;
        let touchStartTime = 0;
        let touchStartX = 0, touchStartY = 0;
        let touchMoved = false;
        let lastTapTime = 0;
        let lastTapX = 0, lastTapY = 0;
        const TAP_MOVE_THRESHOLD = 10;  // px
        const TAP_MAX_DURATION = 300;   // ms
        const DBLTAP_MAX_DELAY = 320;   // ms
        const DBLTAP_DIST = 35;         // px
        
        function onTouchStart(e) {
            const touches = e.touches;
            if (touches.length === 2) {
                e.preventDefault();
                const dx = touches[0].clientX - touches[1].clientX;
                const dy = touches[0].clientY - touches[1].clientY;
                initialPinch = Math.hypot(dx, dy);
                isPan = false;
                touchMoved = true; // двухпальцевый жест — не тап
            } else if (touches.length === 1) {
                touchStartTime = Date.now();
                touchStartX = touches[0].clientX;
                touchStartY = touches[0].clientY;
                touchMoved = false;
                if (scale > 1) {
                    // только при зуме перехватываем тач, чтобы панорамировать
                    e.preventDefault();
                    isPan = true;
                    lastX = touches[0].clientX;
                    lastY = touches[0].clientY;
                }
                // При scale=1 НЕ зовём preventDefault, чтобы браузер мог
                // нормально пропускать тапы — наш собственный детектор
                // двойного тапа сработает по touchend.
            }
        }
        
        function onTouchMove(e) {
            const touches = e.touches;
            if (touches.length === 2 && initialPinch > 0) {
                e.preventDefault();
                const dx = touches[0].clientX - touches[1].clientX;
                const dy = touches[0].clientY - touches[1].clientY;
                const dist = Math.hypot(dx, dy);
                let newScale = scale * (dist / initialPinch);
                newScale = Math.min(Math.max(newScale, 1), 10);
                if (newScale !== scale) {
                    const ratio = newScale / scale;
                    // Центр пинча на экране
                    const pinchX = (touches[0].clientX + touches[1].clientX) / 2;
                    const pinchY = (touches[0].clientY + touches[1].clientY) / 2;
                    const wrapperRect = wrapper.getBoundingClientRect();
                    const cx = wrapperRect.left + wrapperRect.width / 2;
                    const cy = wrapperRect.top + wrapperRect.height / 2;
                    const mx = pinchX - cx;
                    const my = pinchY - cy;
                    translateX = mx * (1 - ratio) + translateX * ratio;
                    translateY = my * (1 - ratio) + translateY * ratio;
                    scale = newScale;
                    clamp();
                }
                // Обновляем базу для непрерывного пинча
                initialPinch = dist;
            } else if (touches.length === 1) {
                const dx = touches[0].clientX - touchStartX;
                const dy = touches[0].clientY - touchStartY;
                if (Math.hypot(dx, dy) > TAP_MOVE_THRESHOLD) {
                    touchMoved = true;
                }
                if (isPan && scale > 1) {
                    e.preventDefault();
                    const deltaX = touches[0].clientX - lastX;
                    const deltaY = touches[0].clientY - lastY;
                    translateX += deltaX;
                    translateY += deltaY;
                    clamp();
                    snap(); // pan пальцем — 1:1 без догонки
                    lastX = touches[0].clientX;
                    lastY = touches[0].clientY;
                }
            }
        }
        
        function onTouchEnd(e) {
            if (e.touches.length < 2) initialPinch = 0;
            if (e.touches.length > 0) return;
            isPan = false;
            const now = Date.now();
            const dt = now - touchStartTime;
            // Считаем «тапом», только если палец почти не сдвинулся
            // и контакт был коротким.
            if (touchMoved || dt > TAP_MAX_DURATION) {
                lastTapTime = 0;
                return;
            }
            const tx = touchStartX, ty = touchStartY;
            // Собственный детектор двойного тапа: работает и для zoom-in,
            // и для возврата обратно — единое поведение с мышью (dblclick).
            const isDblTap =
                now - lastTapTime < DBLTAP_MAX_DELAY &&
                Math.hypot(tx - lastTapX, ty - lastTapY) < DBLTAP_DIST;
            if (!isDblTap) {
                lastTapTime = now;
                lastTapX = tx;
                lastTapY = ty;
                return;
            }
            lastTapTime = 0;
            if (scale > 1) {
                reset();
            } else {
                const wr = wrapper.getBoundingClientRect();
                const mx = tx - (wr.left + wr.width / 2);
                const my = ty - (wr.top + wr.height / 2);
                scale = DBL_ZOOM;
                translateX = mx * (1 - DBL_ZOOM);
                translateY = my * (1 - DBL_ZOOM);
                clamp();
            }
        }
        
        const DBL_ZOOM = 5; // «подлёт» по двойному клику
        
        function onDoubleClick(e) {
            e.preventDefault();
            if (scale > 1) {
                reset();
                return;
            }
            // zoom-to-cursor от scale=1 к scale=DBL_ZOOM
            const wr = wrapper.getBoundingClientRect();
            const mx = e.clientX - (wr.left + wr.width / 2);
            const my = e.clientY - (wr.top  + wr.height / 2);
            scale = DBL_ZOOM;
            translateX = mx * (1 - DBL_ZOOM);
            translateY = my * (1 - DBL_ZOOM);
            clamp();
        }
        
        videoElement.addEventListener('wheel', onWheel, { passive: false });
        videoElement.addEventListener('mousedown', onMouseDown);
        videoElement.addEventListener('dblclick', onDoubleClick);
        window.addEventListener('mousemove', onMouseMove);
        window.addEventListener('mouseup', onMouseUp);
        videoElement.addEventListener('touchstart', onTouchStart, { passive: false });
        videoElement.addEventListener('touchmove', onTouchMove, { passive: false });
        videoElement.addEventListener('touchend', onTouchEnd);
        
        function onResize() {
            if (currentFullscreenData?.video === videoElement) {
                clamp();
            }
        }
        window.addEventListener('resize', onResize);
        
        function onKeyDown(e) {
            if (e.key === 'Escape') {
                e.preventDefault();
                exitFullscreen();
            }
        }
        window.addEventListener('keydown', onKeyDown);
        
        function cancelAnim() {
            if (rafId != null) { cancelAnimationFrame(rafId); rafId = null; }
        }
        
        videoElement._fsHandlers = { onWheel, onMouseDown, onMouseMove, onMouseUp, onDoubleClick, onTouchStart, onTouchMove, onTouchEnd, onResize, onKeyDown, cancelAnim };
    }
    
    function exitFullscreen() {
        if (!currentFullscreenData) return;
        const { overlay, originalWrapper, video, statusSpan } = currentFullscreenData;
        if (statusSpan) {
            if (statusSpan.parentNode) statusSpan.parentNode.removeChild(statusSpan);
            originalWrapper.appendChild(statusSpan);
        }
        if (video._fsHandlers) {
            video._fsHandlers.cancelAnim();
            video.removeEventListener('wheel', video._fsHandlers.onWheel);
            video.removeEventListener('mousedown', video._fsHandlers.onMouseDown);
            video.removeEventListener('dblclick', video._fsHandlers.onDoubleClick);
            window.removeEventListener('mousemove', video._fsHandlers.onMouseMove);
            window.removeEventListener('mouseup', video._fsHandlers.onMouseUp);
            video.removeEventListener('touchstart', video._fsHandlers.onTouchStart);
            video.removeEventListener('touchmove', video._fsHandlers.onTouchMove);
            video.removeEventListener('touchend', video._fsHandlers.onTouchEnd);
            window.removeEventListener('resize', video._fsHandlers.onResize);
            window.removeEventListener('keydown', video._fsHandlers.onKeyDown);
            delete video._fsHandlers;
        }
        video.classList.remove('fullscreen-video');
        video.style.position = 'absolute';
        video.style.width = '100%';
        video.style.height = '100%';
        video.style.maxHeight = '';
        video.style.objectFit = 'cover';
        video.style.transform = '';
        video.style.cursor = '';
        delete video.dataset.zoomed;
        originalWrapper.appendChild(video);
        overlay.remove();
        document.body.style.overflow = '';
        currentFullscreenData = null;
    }

    // ==================== СОЗДАНИЕ КАРТОЧКИ ====================
    function createCameraCard(streamUrl, idx) {
        const card = document.createElement('div');
        card.className = 'camera-card';
        card.dataset.idx = idx;
        
        const videoWrapper = document.createElement('div');
        videoWrapper.className = 'video-wrapper';
        
        const video = document.createElement('video');
        video.setAttribute('playsinline', 'true');
        video.setAttribute('preload', 'auto');
        video.setAttribute('autoplay', 'true');
        video.setAttribute('muted', 'true');
        video.controls = false;
        
        const spinner = document.createElement('div');
        spinner.className = 'loading-spinner';
        
        const statusSpan = document.createElement('div');
        statusSpan.className = 'video-status';
        statusSpan.innerText = "Старт...";
        
        videoWrapper.appendChild(video);
        videoWrapper.appendChild(spinner);
        videoWrapper.appendChild(statusSpan);
        
        const camInfo = document.createElement('div');
        camInfo.className = 'cam-info';
        const titleSpan = document.createElement('span');
        titleSpan.className = 'cam-title';
        const camTitle = getCameraTitle(streamUrl);
        titleSpan.innerText = camTitle;
        
        camInfo.appendChild(titleSpan);
        card.appendChild(videoWrapper);
        card.appendChild(camInfo);
        
        initHLS(video, streamUrl, statusSpan, spinner);
        
        const onCardClick = (e) => {
            e.stopPropagation();
            enterFullscreen(video, camTitle, videoWrapper);
        };
        card.addEventListener('click', onCardClick);
        
        return card;
    }
    
    function renderGrid() {
        const grid = document.getElementById('cameraGrid');
        if (!grid) return;
        grid.innerHTML = '';
        STREAMS.forEach((url, i) => {
            const card = createCameraCard(url, i);
            grid.appendChild(card);
        });
    }
    
    document.addEventListener('DOMContentLoaded', () => {
        renderGrid();
    });
</script>
</body>
