<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CityBay · Камеры</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 10% 20%, #0a0f1a, #05080f);
            font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        /* Заголовок скрыт */
        .header {
            display: none;
        }

        .camera-grid {
            max-width: 1600px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 24px;
        }

        .camera-card {
            background: rgba(12, 18, 32, 0.8);
            backdrop-filter: blur(6px);
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.12);
            transition: transform 0.2s ease, box-shadow 0.2s, border-color 0.2s;
            cursor: pointer;
        }

        .camera-card:hover {
            transform: translateY(-5px);
            background: rgba(22, 32, 55, 0.92);
            box-shadow: 0 28px 44px -18px black;
            border-color: rgba(100, 150, 255, 0.4);
        }

        .video-wrapper {
            position: relative;
            background: #000;
            width: 100%;
            padding-top: 56.25%;
            overflow: hidden;
        }

        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #010101;
        }

        .cam-info {
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.2));
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        .cam-title {
            font-weight: 600;
            font-size: 0.9rem;
            color: #f0f5ff;
        }

        .fullscreen-badge {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 40px;
            padding: 4px 10px;
            font-size: 0.65rem;
            font-weight: 500;
            color: #bbdbff;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .fullscreen-badge::after {
            content: "⛶";
            font-size: 0.9rem;
        }

        .video-status {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 20px;
            padding: 3px 10px;
            font-size: 0.65rem;
            font-weight: 500;
            font-family: monospace;
            backdrop-filter: blur(4px);
            z-index: 12;
            pointer-events: none;
        }

        .status-live {
            color: #6effb0;
            text-shadow: 0 0 2px #00aa55;
        }

        .status-buffering {
            color: #ffd966;
        }

        .status-error {
            color: #ff9f8e;
        }

        .loading-spinner {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 28px;
            height: 28px;
            margin: -14px 0 0 -14px;
            border: 2px solid rgba(255, 255, 255, 0.25);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 0.85s linear infinite;
            z-index: 10;
            pointer-events: none;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Полноэкранный режим — поддерживаем зум */
        .camera-card:fullscreen {
            background: #000;
            border-radius: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border: none;
            position: relative;
            overflow: auto;
            -webkit-overflow-scrolling: touch;
        }

        .camera-card:fullscreen .video-wrapper {
            padding-top: 0;
            height: 100vh;
            width: 100%;
            overflow: auto;
            -webkit-overflow-scrolling: touch;
            touch-action: pinch-zoom;
        }

        .camera-card:fullscreen video {
            object-fit: contain;
            width: 100%;
            height: 100%;
            transform-origin: center center;
        }

        .camera-card:fullscreen .cam-info {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 30;
        }

        /* Подсказка о зуме */
        .zoom-hint {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(12px);
            padding: 6px 16px;
            border-radius: 40px;
            color: #ccc;
            font-size: 0.7rem;
            z-index: 100;
            pointer-events: none;
            white-space: nowrap;
            font-weight: 500;
            transition: opacity 0.3s;
        }

        @media (max-width: 760px) {
            .camera-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            body {
                padding: 16px;
            }
            .zoom-hint {
                font-size: 0.6rem;
                bottom: 12px;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.8/dist/hls.min.js"></script>
</head>
<body>
    <div class="camera-grid" id="cameraGrid"></div>

<script>
    // ==================== ВСЕ ПОТОКИ ====================
    const STREAMS = [
        "https://rtsp2.videocam.online/live/CityBay2.stream/playlist.m3u8",
        "https://rtsp2.videocam.online/live/CityBay3.stream/playlist.m3u8",
        "https://rtsp2.videocam.online/live/CityBay4.stream/playlist.m3u8",
        "https://rtsp2.videocam.online/live/CityBay5.stream/playlist.m3u8",
        "https://rtsp2.videocam.online/live/CityBay6.stream/playlist.m3u8",
        "https://rtsp2.videocam.online/live/CityBay7.stream/playlist.m3u8",
        "https://rtsp2.videocam.online/live/CityBay8.stream/playlist.m3u8",
        "https://rtsp2.videocam.online/live/CityBay9.stream/playlist.m3u8",
        "https://rtsp2.videocam.online/live/CityBay10.stream/playlist.m3u8",
        "https://rtsp2.videocam.online/live/CityBay11.stream/playlist.m3u8",
        "https://rtsp2.videocam.online/live/CityBay12.stream/playlist.m3u8",
        "https://rtsp2.videocam.online/live/CityBay13.stream/playlist.m3u8",
        "https://rtsp2.videocam.online/live/CityBay14.stream/playlist.m3u8"
    ];

    let currentFullscreenCard = null;
    let zoomHintTimeout = null;

    // ==================== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ====================
    function getCameraTitle(url) {
        const match = url.match(/CityBay(\d+)\.stream/);
        return match ? `CityBay ${match[1]}` : "Live Camera";
    }

    // Показать подсказку о зуме
    function showZoomHint() {
        let hint = document.querySelector('.zoom-hint');
        if (!hint) {
            hint = document.createElement('div');
            hint.className = 'zoom-hint';
            hint.innerText = '🔍 Два пальца — масштабирование';
            document.body.appendChild(hint);
        }
        hint.style.opacity = '1';
        if (zoomHintTimeout) clearTimeout(zoomHintTimeout);
        zoomHintTimeout = setTimeout(() => {
            if (hint) hint.style.opacity = '0';
        }, 3000);
    }

    // ==================== HLS И АВТОЗАПУСК ====================
    const videoRegistry = new Map();

    function updateStatus(statusSpan, text, type = 'buffering') {
        if (!statusSpan) return;
        statusSpan.innerText = text;
        statusSpan.classList.remove('status-live', 'status-buffering', 'status-error');
        if (type === 'live') statusSpan.classList.add('status-live');
        else if (type === 'error') statusSpan.classList.add('status-error');
        else statusSpan.classList.add('status-buffering');
    }

    async function attemptPlayWithRetry(video, maxRetries = 5, baseDelay = 1000, statusSpan, spinner) {
        video.muted = true;
        for (let attempt = 1; attempt <= maxRetries; attempt++) {
            try {
                await video.play();
                updateStatus(statusSpan, "● LIVE", "live");
                if (spinner) spinner.style.display = 'none';
                return true;
            } catch (err) {
                if (attempt < maxRetries) {
                    const delay = baseDelay * attempt;
                    updateStatus(statusSpan, `Попытка ${attempt}/${maxRetries}...`, "buffering");
                    await new Promise(r => setTimeout(r, delay));
                } else {
                    updateStatus(statusSpan, "Автозапуск не удался", "error");
                    if (spinner) spinner.style.display = 'none';
                    return false;
                }
            }
        }
        return false;
    }

    function initHLS(video, streamUrl, statusSpan, spinner) {
        if (video.hlsInstance) {
            try { video.hlsInstance.destroy(); } catch(e) {}
            video.hlsInstance = null;
        }
        video.removeAttribute('src');
        
        const showSpinner = (show) => {
            if (spinner) spinner.style.display = show ? 'block' : 'none';
        };
        
        showSpinner(true);
        updateStatus(statusSpan, "Подключение...", "buffering");
        
        let playAttempted = false;
        const startPlayback = async () => {
            if (playAttempted) return;
            playAttempted = true;
            showSpinner(false);
            await attemptPlayWithRetry(video, 5, 1000, statusSpan, spinner);
        };
        
        if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = streamUrl;
            video.addEventListener('loadedmetadata', () => startPlayback());
            video.addEventListener('error', () => {
                if (!playAttempted) updateStatus(statusSpan, "Ошибка потока", "error");
                showSpinner(false);
            });
        } 
        else if (Hls.isSupported()) {
            const hls = new Hls({
                debug: false,
                enableWorker: true,
                lowLatencyMode: true,
                maxBufferLength: 30,
                manifestLoadingTimeOut: 10000,
                levelLoadingTimeOut: 8000,
            });
            video.hlsInstance = hls;
            hls.loadSource(streamUrl);
            hls.attachMedia(video);
            
            let manifestReady = false;
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                manifestReady = true;
                showSpinner(false);
                startPlayback();
            });
            
            hls.on(Hls.Events.ERROR, (event, data) => {
                if (data.fatal) {
                    if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
                        updateStatus(statusSpan, "Сеть", "error");
                        setTimeout(() => {
                            if (video.hlsInstance) {
                                video.hlsInstance.startLoad();
                                if (video.paused && !playAttempted) startPlayback();
                            }
                        }, 5000);
                    } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
                        updateStatus(statusSpan, "Медиа", "error");
                        hls.recoverMediaError();
                    }
                    showSpinner(false);
                } else {
                    if (!manifestReady) updateStatus(statusSpan, "Загрузка...", "buffering");
                }
            });
        } else {
            updateStatus(statusSpan, "HLS не поддержан", "error");
            showSpinner(false);
        }
        
        videoRegistry.set(video, { hls: video.hlsInstance, statusSpan, spinner, streamUrl });
    }

    // ==================== СОЗДАНИЕ КАРТОЧКИ ====================
    function createCameraCard(streamUrl, idx) {
        const card = document.createElement('div');
        card.className = 'camera-card';
        card.dataset.idx = idx;
        
        const videoWrapper = document.createElement('div');
        videoWrapper.className = 'video-wrapper';
        
        const video = document.createElement('video');
        video.setAttribute('playsinline', 'true');
        video.setAttribute('preload', 'auto');
        video.setAttribute('autoplay', 'true');
        video.setAttribute('muted', 'true');
        video.controls = false;
        
        // Разрешаем зум на видео (через CSS)
        video.style.transformOrigin = 'center center';
        
        const spinner = document.createElement('div');
        spinner.className = 'loading-spinner';
        
        const statusSpan = document.createElement('div');
        statusSpan.className = 'video-status';
        statusSpan.innerText = "Старт...";
        
        videoWrapper.appendChild(video);
        videoWrapper.appendChild(spinner);
        videoWrapper.appendChild(statusSpan);
        
        const camInfo = document.createElement('div');
        camInfo.className = 'cam-info';
        const titleSpan = document.createElement('span');
        titleSpan.className = 'cam-title';
        titleSpan.innerText = getCameraTitle(streamUrl);
        
        const fsBadge = document.createElement('span');
        fsBadge.className = 'fullscreen-badge';
        fsBadge.innerText = 'Во весь экран';
        
        camInfo.appendChild(titleSpan);
        camInfo.appendChild(fsBadge);
        card.appendChild(videoWrapper);
        card.appendChild(camInfo);
        
        initHLS(video, streamUrl, statusSpan, spinner);
        
        // Клик по карточке: полноэкранный режим
        const onCardClick = async (e) => {
            e.stopPropagation();
            if (video.paused) {
                video.muted = true;
                await video.play().catch(()=>{});
            }
            if (video.muted) video.muted = false;
            if (!document.fullscreenElement) {
                try {
                    await card.requestFullscreen({ navigationUI: "show" });
                } catch (err) {}
            } else {
                await document.exitFullscreen();
            }
        };
        card.addEventListener('click', onCardClick);
        
        // Двойной тап для выхода из полноэкранного режима (удобно)
        let lastTap = 0;
        card.addEventListener('touchstart', (e) => {
            const now = Date.now();
            if (now - lastTap < 280) {
                e.preventDefault();
                if (document.fullscreenElement === card) {
                    document.exitFullscreen();
                }
            }
            lastTap = now;
        });
        card.addEventListener('dblclick', (e) => {
            e.preventDefault();
            if (document.fullscreenElement === card) {
                document.exitFullscreen();
            }
        });
        
        return card;
    }
    
    // ==================== ОТРИСОВКА СЕТКИ ====================
    function renderGrid() {
        const grid = document.getElementById('cameraGrid');
        if (!grid) return;
        grid.innerHTML = '';
        STREAMS.forEach((url, i) => {
            const card = createCameraCard(url, i);
            grid.appendChild(card);
        });
    }
    
    // ==================== ПОЛНОЭКРАННЫЙ РЕЖИМ ====================
    function onFullscreenChange() {
        const fsElement = document.fullscreenElement;
        if (fsElement && fsElement.classList && fsElement.classList.contains('camera-card')) {
            currentFullscreenCard = fsElement;
            // Включаем поддержку зума на контейнере
            const wrapper = fsElement.querySelector('.video-wrapper');
            const video = fsElement.querySelector('video');
            
            if (wrapper) {
                wrapper.style.overflow = 'auto';
                wrapper.style.webkitOverflowScrolling = 'touch';
                wrapper.style.touchAction = 'pinch-zoom';
                // Разрешаем скролл для зума
                wrapper.style.cursor = 'grab';
            }
            if (video) {
                video.style.objectFit = 'contain';
                video.style.width = '100%';
                video.style.height = '100%';
            }
            
            // Показываем подсказку о зуме
            showZoomHint();
            
            // Запускаем видео если на паузе
            if (video && video.paused) {
                video.muted = true;
                video.play().catch(()=>{});
            }
            if (video && video.muted) video.muted = false;
        } else if (currentFullscreenCard) {
            // Восстанавливаем стили при выходе
            if (currentFullscreenCard) {
                const wrapper = currentFullscreenCard.querySelector('.video-wrapper');
                if (wrapper) {
                    wrapper.style.overflow = 'hidden';
                    wrapper.style.touchAction = '';
                }
                const video = currentFullscreenCard.querySelector('video');
                if (video) {
                    video.style.objectFit = 'cover';
                }
            }
            currentFullscreenCard = null;
        }
    }
    
    // ==================== ЗАПУСК ====================
    document.addEventListener('DOMContentLoaded', () => {
        renderGrid();
        document.addEventListener('fullscreenchange', onFullscreenChange);
    });
</script>
</body>
</html>
