<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CityBay</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 10% 20%, #0a0f1a, #05080f);
            font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 28px;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #eef4ff, #7faeff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .camera-grid {
            max-width: 1600px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 24px;
        }

        .camera-card {
            background: rgba(12, 18, 32, 0.8);
            backdrop-filter: blur(6px);
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.12);
            transition: transform 0.2s ease, box-shadow 0.2s, border-color 0.2s;
            cursor: pointer;
        }

        .camera-card:hover {
            transform: translateY(-5px);
            background: rgba(22, 32, 55, 0.92);
            box-shadow: 0 28px 44px -18px black;
            border-color: rgba(100, 150, 255, 0.4);
        }

        .video-wrapper {
            position: relative;
            background: #000;
            width: 100%;
            padding-top: 56.25%;
            overflow: hidden;
        }

        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #010101;
        }

        .cam-info {
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.2));
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        .cam-title {
            font-weight: 600;
            font-size: 0.9rem;
            color: #f0f5ff;
        }

        .fullscreen-badge {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 40px;
            padding: 4px 10px;
            font-size: 0.65rem;
            font-weight: 500;
            color: #bbdbff;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .fullscreen-badge::after {
            content: "⛶";
            font-size: 0.9rem;
        }

        .video-status {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 20px;
            padding: 3px 10px;
            font-size: 0.65rem;
            font-weight: 500;
            font-family: monospace;
            backdrop-filter: blur(4px);
            z-index: 12;
            pointer-events: none;
        }

        .status-live {
            color: #6effb0;
            text-shadow: 0 0 2px #00aa55;
        }

        .status-buffering {
            color: #ffd966;
        }

        .status-error {
            color: #ff9f8e;
        }

        .loading-spinner {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 28px;
            height: 28px;
            margin: -14px 0 0 -14px;
            border: 2px solid rgba(255, 255, 255, 0.25);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 0.85s linear infinite;
            z-index: 10;
            pointer-events: none;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Полноэкранный режим */
        .camera-card:fullscreen {
            background: #000;
            border-radius: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border: none;
            position: relative;
        }

        .camera-card:fullscreen .video-wrapper {
            padding-top: 0;
            height: 100vh;
        }

        .camera-card:fullscreen video {
            object-fit: contain;
        }

        .camera-card:fullscreen .cam-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 30;
        }

        /* ===== НАВИГАЦИОННЫЕ КНОПКИ (всегда видны в fullscreen) ===== */
        .fs-nav-btn {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            width: 70px;
            height: 100px;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10000;
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        .fs-nav-btn:hover {
            background: rgba(0, 0, 0, 0.9);
            transform: translateY(-50%) scale(1.08);
            border-color: rgba(100, 150, 255, 0.9);
        }

        .fs-nav-btn.left {
            left: 25px;
        }

        .fs-nav-btn.right {
            right: 25px;
        }

        .fs-nav-btn svg {
            width: 42px;
            height: 42px;
            stroke: white;
            stroke-width: 2.5;
            fill: none;
            filter: drop-shadow(0 0 3px rgba(0,0,0,0.5));
        }

        .fs-counter {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(12px);
            padding: 8px 20px;
            border-radius: 50px;
            color: white;
            font-size: 1rem;
            font-weight: 700;
            z-index: 10000;
            font-family: monospace;
            letter-spacing: 1px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            pointer-events: none;
        }

        .fs-title {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(12px);
            padding: 8px 20px;
            border-radius: 50px;
            color: #bbdbff;
            font-size: 0.9rem;
            font-weight: 600;
            z-index: 10000;
            border: 1px solid rgba(255, 255, 255, 0.3);
            pointer-events: none;
        }

        .fs-hint {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            padding: 6px 18px;
            border-radius: 50px;
            color: #ccc;
            font-size: 0.75rem;
            z-index: 10000;
            pointer-events: none;
            white-space: nowrap;
            font-weight: 500;
        }

        @media (max-width: 760px) {
            .camera-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            body {
                padding: 16px;
            }
            .header h1 {
                font-size: 1.6rem;
            }
            .fs-nav-btn {
                width: 50px;
                height: 70px;
            }
            .fs-nav-btn svg {
                width: 30px;
                height: 30px;
            }
            .fs-nav-btn.left {
                left: 12px;
            }
            .fs-nav-btn.right {
                right: 12px;
            }
            .fs-counter {
                font-size: 0.8rem;
                padding: 5px 14px;
                top: 12px;
                right: 12px;
            }
            .fs-title {
                font-size: 0.7rem;
                padding: 5px 14px;
                top: 12px;
                left: 12px;
            }
            .fs-hint {
                font-size: 0.6rem;
                bottom: 12px;
                white-space: nowrap;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.8/dist/hls.min.js"></script>
</head>
<body>
    <div class="header">
        <h1>📡 CityBay</h1>
    </div>
    <div class="camera-grid" id="cameraGrid"></div>

<script>
    // ==================== СПИСОК КАМЕР ====================
    const STREAMS = [
        "https://rtsp2.videocam.online/live/CityBay2.stream/playlist.m3u8",
        "https://rtsp2.videocam.online/live/CityBay3.stream/playlist.m3u8",
        "https://rtsp2.videocam.online/live/CityBay4.stream/playlist.m3u8",
        "https://rtsp2.videocam.online/live/CityBay5.stream/playlist.m3u8",
        "https://rtsp2.videocam.online/live/CityBay6.stream/playlist.m3u8",
        "https://rtsp2.videocam.online/live/CityBay7.stream/playlist.m3u8",
        "https://rtsp2.videocam.online/live/CityBay8.stream/playlist.m3u8",
        "https://rtsp2.videocam.online/live/CityBay9.stream/playlist.m3u8",
        "https://rtsp2.videocam.online/live/CityBay10.stream/playlist.m3u8",
        "https://rtsp2.videocam.online/live/CityBay11.stream/playlist.m3u8",
        "https://rtsp2.videocam.online/live/CityBay12.stream/playlist.m3u8",
        "https://rtsp2.videocam.online/live/CityBay13.stream/playlist.m3u8",
        "https://rtsp2.videocam.online/live/CityBay14.stream/playlist.m3u8"
    ];

    // Глобальные переменные для навигации в полноэкранном режиме
    let currentFullscreenCard = null;
    let activeNavElements = null; // { leftBtn, rightBtn, counter, title, hint }

    // ==================== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ====================
    function getCameraTitle(url) {
        const match = url.match(/CityBay(\d+)\.stream/);
        return match ? `CityBay ${match[1]}` : "Live Camera";
    }

    function getCameraNumberFromCard(card) {
        const idx = parseInt(card.dataset.idx);
        if (!isNaN(idx) && STREAMS[idx]) return idx + 1;
        return null;
    }

    function getStreamUrlFromCard(card) {
        const idx = parseInt(card.dataset.idx);
        if (!isNaN(idx) && STREAMS[idx]) return STREAMS[idx];
        return null;
    }

    // Обновить текст счётчика и заголовка для текущей карточки
    function updateFullscreenUI(card) {
        if (!activeNavElements) return;
        const allCards = Array.from(document.querySelectorAll('.camera-card'));
        const currentIndex = allCards.indexOf(card);
        if (currentIndex !== -1 && activeNavElements.counter) {
            activeNavElements.counter.innerText = `${currentIndex + 1} / ${allCards.length}`;
        }
        const streamUrl = getStreamUrlFromCard(card);
        if (streamUrl && activeNavElements.title) {
            activeNavElements.title.innerText = getCameraTitle(streamUrl);
        }
    }

    // Переключение на другую камеру (delta = -1 назад, +1 вперёд)
    function switchToCamera(delta) {
        if (!currentFullscreenCard) return;
        const allCards = Array.from(document.querySelectorAll('.camera-card'));
        const currentIndex = allCards.indexOf(currentFullscreenCard);
        let newIndex = currentIndex + delta;
        if (newIndex < 0) newIndex = allCards.length - 1;
        if (newIndex >= allCards.length) newIndex = 0;
        const newCard = allCards[newIndex];
        if (newCard && newCard !== currentFullscreenCard) {
            // Выходим из полноэкранного режима текущей карточки
            document.exitFullscreen().then(() => {
                // Небольшая задержка для стабильности
                setTimeout(() => {
                    // Запускаем видео на новой карточке (если на паузе)
                    const newVideo = newCard.querySelector('video');
                    if (newVideo && newVideo.paused) {
                        newVideo.muted = true;
                        newVideo.play().catch(() => {});
                    }
                    if (newVideo && newVideo.muted) {
                        newVideo.muted = false;
                    }
                    // Открываем новую карточку в полноэкранном режиме
                    newCard.requestFullscreen({ navigationUI: "show" }).catch(e => console.log("fullscreen error", e));
                }, 80);
            }).catch(err => console.log("exit fullscreen error", err));
        }
    }

    // Удалить элементы навигации
    function removeNavigation() {
        if (activeNavElements) {
            if (activeNavElements.leftBtn) activeNavElements.leftBtn.remove();
            if (activeNavElements.rightBtn) activeNavElements.rightBtn.remove();
            if (activeNavElements.counter) activeNavElements.counter.remove();
            if (activeNavElements.title) activeNavElements.title.remove();
            if (activeNavElements.hint) activeNavElements.hint.remove();
            activeNavElements = null;
        }
    }

    // Создать и показать элементы навигации (кнопки, счётчик, заголовок)
    function createNavigation(card) {
        // Удаляем старые, если были
        removeNavigation();
        
        const allCards = Array.from(document.querySelectorAll('.camera-card'));
        const currentIndex = allCards.indexOf(card);
        
        // Левая кнопка
        const leftBtn = document.createElement('div');
        leftBtn.className = 'fs-nav-btn left';
        leftBtn.innerHTML = '<svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"></polyline></svg>';
        leftBtn.onclick = (e) => {
            e.stopPropagation();
            switchToCamera(-1);
        };
        
        // Правая кнопка
        const rightBtn = document.createElement('div');
        rightBtn.className = 'fs-nav-btn right';
        rightBtn.innerHTML = '<svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"></polyline></svg>';
        rightBtn.onclick = (e) => {
            e.stopPropagation();
            switchToCamera(1);
        };
        
        // Счётчик
        const counter = document.createElement('div');
        counter.className = 'fs-counter';
        counter.innerText = `${currentIndex + 1} / ${allCards.length}`;
        
        // Заголовок камеры
        const streamUrl = getStreamUrlFromCard(card);
        const title = document.createElement('div');
        title.className = 'fs-title';
        title.innerText = streamUrl ? getCameraTitle(streamUrl) : 'CityBay';
        
        // Подсказка
        const hint = document.createElement('div');
        hint.className = 'fs-hint';
        hint.innerText = '← → или свайп — листать | ESC — выход';
        
        document.body.appendChild(leftBtn);
        document.body.appendChild(rightBtn);
        document.body.appendChild(counter);
        document.body.appendChild(title);
        document.body.appendChild(hint);
        
        activeNavElements = { leftBtn, rightBtn, counter, title, hint };
    }

    // ==================== HLS И АВТОЗАПУСК ====================
    const videoRegistry = new Map();

    function updateStatus(statusSpan, text, type = 'buffering') {
        if (!statusSpan) return;
        statusSpan.innerText = text;
        statusSpan.classList.remove('status-live', 'status-buffering', 'status-error');
        if (type === 'live') statusSpan.classList.add('status-live');
        else if (type === 'error') statusSpan.classList.add('status-error');
        else statusSpan.classList.add('status-buffering');
    }

    async function attemptPlayWithRetry(video, maxRetries = 5, baseDelay = 1000, statusSpan, spinner) {
        video.muted = true;
        for (let attempt = 1; attempt <= maxRetries; attempt++) {
            try {
                await video.play();
                updateStatus(statusSpan, "● LIVE", "live");
                if (spinner) spinner.style.display = 'none';
                return true;
            } catch (err) {
                if (attempt < maxRetries) {
                    const delay = baseDelay * attempt;
                    updateStatus(statusSpan, `Попытка ${attempt}/${maxRetries}...`, "buffering");
                    await new Promise(r => setTimeout(r, delay));
                } else {
                    updateStatus(statusSpan, "Автозапуск не удался", "error");
                    if (spinner) spinner.style.display = 'none';
                    return false;
                }
            }
        }
        return false;
    }

    function initHLS(video, streamUrl, statusSpan, spinner) {
        if (video.hlsInstance) {
            try { video.hlsInstance.destroy(); } catch(e) {}
            video.hlsInstance = null;
        }
        video.removeAttribute('src');
        
        const showSpinner = (show) => {
            if (spinner) spinner.style.display = show ? 'block' : 'none';
        };
        
        showSpinner(true);
        updateStatus(statusSpan, "Подключение...", "buffering");
        
        let playAttempted = false;
        const startPlayback = async () => {
            if (playAttempted) return;
            playAttempted = true;
            showSpinner(false);
            await attemptPlayWithRetry(video, 5, 1000, statusSpan, spinner);
        };
        
        if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = streamUrl;
            video.addEventListener('loadedmetadata', () => startPlayback());
            video.addEventListener('error', () => {
                if (!playAttempted) updateStatus(statusSpan, "Ошибка потока", "error");
                showSpinner(false);
            });
        } 
        else if (Hls.isSupported()) {
            const hls = new Hls({
                debug: false,
                enableWorker: true,
                lowLatencyMode: true,
                maxBufferLength: 30,
                manifestLoadingTimeOut: 10000,
                levelLoadingTimeOut: 8000,
            });
            video.hlsInstance = hls;
            hls.loadSource(streamUrl);
            hls.attachMedia(video);
            
            let manifestReady = false;
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                manifestReady = true;
                showSpinner(false);
                startPlayback();
            });
            
            hls.on(Hls.Events.ERROR, (event, data) => {
                if (data.fatal) {
                    if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
                        updateStatus(statusSpan, "Сеть", "error");
                        setTimeout(() => {
                            if (video.hlsInstance) {
                                video.hlsInstance.startLoad();
                                if (video.paused && !playAttempted) startPlayback();
                            }
                        }, 5000);
                    } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
                        updateStatus(statusSpan, "Медиа", "error");
                        hls.recoverMediaError();
                    }
                    showSpinner(false);
                } else {
                    if (!manifestReady) updateStatus(statusSpan, "Загрузка...", "buffering");
                }
            });
        } else {
            updateStatus(statusSpan, "HLS не поддержан", "error");
            showSpinner(false);
        }
        
        videoRegistry.set(video, { hls: video.hlsInstance, statusSpan, spinner, streamUrl });
    }

    // ==================== СОЗДАНИЕ КАРТОЧКИ КАМЕРЫ ====================
    function createCameraCard(streamUrl, idx) {
        const card = document.createElement('div');
        card.className = 'camera-card';
        card.dataset.idx = idx;
        
        const videoWrapper = document.createElement('div');
        videoWrapper.className = 'video-wrapper';
        
        const video = document.createElement('video');
        video.setAttribute('playsinline', 'true');
        video.setAttribute('preload', 'auto');
        video.setAttribute('autoplay', 'true');
        video.setAttribute('muted', 'true');
        video.controls = false;
        
        const spinner = document.createElement('div');
        spinner.className = 'loading-spinner';
        
        const statusSpan = document.createElement('div');
        statusSpan.className = 'video-status';
        statusSpan.innerText = "Старт...";
        
        videoWrapper.appendChild(video);
        videoWrapper.appendChild(spinner);
        videoWrapper.appendChild(statusSpan);
        
        const camInfo = document.createElement('div');
        camInfo.className = 'cam-info';
        const titleSpan = document.createElement('span');
        titleSpan.className = 'cam-title';
        titleSpan.innerText = getCameraTitle(streamUrl);
        
        const fsBadge = document.createElement('span');
        fsBadge.className = 'fullscreen-badge';
        fsBadge.innerText = 'Во весь экран';
        
        camInfo.appendChild(titleSpan);
        camInfo.appendChild(fsBadge);
        card.appendChild(videoWrapper);
        card.appendChild(camInfo);
        
        initHLS(video, streamUrl, statusSpan, spinner);
        
        // Клик по карточке: вход в полноэкранный режим + запуск видео
        const onCardClick = async (e) => {
            e.stopPropagation();
            if (video.paused) {
                video.muted = true;
                await video.play().catch(()=>{});
            }
            if (video.muted) video.muted = false;
            if (!document.fullscreenElement) {
                try {
                    await card.requestFullscreen({ navigationUI: "show" });
                } catch (err) {}
            } else {
                await document.exitFullscreen();
            }
        };
        card.addEventListener('click', onCardClick);
        
        // Обработчик полноэкранного события для этой карточки
        card.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement === card) {
                // Вошли в полноэкранный режим
                currentFullscreenCard = card;
                createNavigation(card);
                // Убедимся, что видео играет и снят mute
                if (video.paused) {
                    video.muted = true;
                    video.play().catch(()=>{});
                }
                if (video.muted) video.muted = false;
                // Обновляем UI при изменении
                updateFullscreenUI(card);
            } else if (currentFullscreenCard === card) {
                // Вышли из полноэкранного режима
                currentFullscreenCard = null;
                removeNavigation();
            }
        });
        
        // Свайп влево/вправо для навигации (только когда карточка в fullscreen)
        let touchStartX = null;
        card.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
        }, { passive: true });
        card.addEventListener('touchmove', (e) => {
            if (!document.fullscreenElement || document.fullscreenElement !== card) return;
            if (touchStartX === null) return;
            const deltaX = e.touches[0].clientX - touchStartX;
            if (Math.abs(deltaX) > 50) {
                e.preventDefault();
                if (deltaX > 0) switchToCamera(-1);
                else switchToCamera(1);
                touchStartX = null;
            }
        }, { passive: false });
        
        // Глобальная клавиатура (работает только в полноэкранном режиме)
        const onKeyDown = (e) => {
            if (!document.fullscreenElement) return;
            if (e.key === 'ArrowLeft') {
                e.preventDefault();
                switchToCamera(-1);
            } else if (e.key === 'ArrowRight') {
                e.preventDefault();
                switchToCamera(1);
            }
        };
        document.addEventListener('keydown', onKeyDown);
        card._keyHandler = onKeyDown;
        
        // Двойной тап для выхода/входа (необязательно, но оставим)
        let lastTap = 0;
        card.addEventListener('touchstart', (e) => {
            const now = Date.now();
            if (now - lastTap < 280) {
                e.preventDefault();
                if (video.paused) { video.muted = true; video.play().catch(()=>{}); }
                if (video.muted) video.muted = false;
                if (!document.fullscreenElement) card.requestFullscreen().catch(()=>{});
                else document.exitFullscreen();
            }
            lastTap = now;
        });
        card.addEventListener('dblclick', (e) => {
            e.preventDefault();
            if (video.paused) { video.muted = true; video.play().catch(()=>{}); }
            if (video.muted) video.muted = false;
            if (!document.fullscreenElement) card.requestFullscreen().catch(()=>{});
            else document.exitFullscreen();
        });
        
        return card;
    }
    
    function renderGrid() {
        const grid = document.getElementById('cameraGrid');
        if (!grid) return;
        grid.innerHTML = '';
        STREAMS.forEach((url, i) => {
            const card = createCameraCard(url, i);
            grid.appendChild(card);
        });
    }
    
    document.addEventListener('DOMContentLoaded', () => {
        renderGrid();
    });
</script>
</body>
</html>
