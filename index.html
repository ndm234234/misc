<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CityBay · Камеры</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 10% 20%, #0a0f1a, #05080f);
            font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .camera-grid {
            max-width: 1600px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 24px;
        }

        .camera-card {
            background: rgba(12, 18, 32, 0.8);
            backdrop-filter: blur(6px);
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.12);
            transition: transform 0.2s ease, box-shadow 0.2s, border-color 0.2s;
            cursor: pointer;
        }

        .camera-card:hover {
            transform: translateY(-5px);
            background: rgba(22, 32, 55, 0.92);
            box-shadow: 0 28px 44px -18px black;
            border-color: rgba(100, 150, 255, 0.4);
        }

        .video-wrapper {
            position: relative;
            background: #000;
            width: 100%;
            padding-top: 56.25%;
            overflow: hidden;
        }

        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #010101;
            pointer-events: auto;
        }

        .cam-info {
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.2));
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        .cam-title {
            font-weight: 600;
            font-size: 0.9rem;
            color: #f0f5ff;
        }

        .fullscreen-badge {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 40px;
            padding: 4px 10px;
            font-size: 0.65rem;
            font-weight: 500;
            color: #bbdbff;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .fullscreen-badge::after {
            content: "⛶";
            font-size: 0.9rem;
        }

        .video-status {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 20px;
            padding: 3px 10px;
            font-size: 0.65rem;
            font-weight: 500;
            font-family: monospace;
            backdrop-filter: blur(4px);
            z-index: 12;
            pointer-events: none;
        }

        .status-live {
            color: #6effb0;
            text-shadow: 0 0 2px #00aa55;
        }

        .status-buffering {
            color: #ffd966;
        }

        .status-error {
            color: #ff9f8e;
        }

        .loading-spinner {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 28px;
            height: 28px;
            margin: -14px 0 0 -14px;
            border: 2px solid rgba(255, 255, 255, 0.25);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 0.85s linear infinite;
            z-index: 10;
            pointer-events: none;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== ПОЛНОЭКРАННЫЙ ОВЕРЛЕЙ ===== */
        .fullscreen-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .fullscreen-video-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .fullscreen-video {
            position: relative;
            width: 100%;
            height: auto;
            max-height: 100%;
            object-fit: contain;
            cursor: grab;
            transition: transform 0.05s linear;
            transform-origin: center center;
        }

        .fullscreen-video:active {
            cursor: grabbing;
        }

        .fullscreen-exit-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10001;
            transition: all 0.2s ease;
            font-size: 26px;
            color: white;
            font-weight: bold;
        }

        .fullscreen-exit-btn:hover {
            background: rgba(200, 50, 50, 0.9);
            transform: scale(1.05);
        }

        .fullscreen-title {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(12px);
            padding: 8px 16px;
            border-radius: 40px;
            color: white;
            font-size: 0.9rem;
            font-weight: 500;
            z-index: 10001;
            pointer-events: none;
        }

        .zoom-hint-full {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(12px);
            padding: 6px 16px;
            border-radius: 40px;
            color: #ccc;
            font-size: 0.7rem;
            z-index: 10001;
            pointer-events: none;
            white-space: nowrap;
        }

        @media (max-width: 760px) {
            .camera-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            body {
                padding: 16px;
            }
            .fullscreen-exit-btn {
                top: 12px;
                right: 12px;
                width: 44px;
                height: 44px;
                font-size: 22px;
            }
            .fullscreen-title {
                top: 12px;
                left: 12px;
                font-size: 0.75rem;
                padding: 6px 12px;
            }
            .zoom-hint-full {
                font-size: 0.6rem;
                bottom: 12px;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.8/dist/hls.min.js"></script>
</head>
<body>
    <div class="camera-grid" id="cameraGrid"></div>

<script>
    // ==================== ВСЕ ПОТОКИ ====================
    const STREAMS = [
        "https://rtsp2.videocam.online/live/CityBay2.stream/playlist.m3u8",
        "https://rtsp2.videocam.online/live/CityBay3.stream/playlist.m3u8",
        "https://rtsp2.videocam.online/live/CityBay4.stream/playlist.m3u8",
        "https://rtsp2.videocam.online/live/CityBay5.stream/playlist.m3u8",
        "https://rtsp2.videocam.online/live/CityBay6.stream/playlist.m3u8",
        "https://rtsp2.videocam.online/live/CityBay7.stream/playlist.m3u8",
        "https://rtsp2.videocam.online/live/CityBay8.stream/playlist.m3u8",
        "https://rtsp2.videocam.online/live/CityBay9.stream/playlist.m3u8",
        "https://rtsp2.videocam.online/live/CityBay10.stream/playlist.m3u8",
        "https://rtsp2.videocam.online/live/CityBay11.stream/playlist.m3u8",
        "https://rtsp2.videocam.online/live/CityBay12.stream/playlist.m3u8",
        "https://rtsp2.videocam.online/live/CityBay13.stream/playlist.m3u8",
        "https://rtsp2.videocam.online/live/CityBay14.stream/playlist.m3u8"
    ];

    function getCameraTitle(url) {
        const match = url.match(/CityBay(\d+)\.stream/);
        return match ? `CityBay ${match[1]}` : "Live Camera";
    }

    // Храним информацию о том, в полноэкранном ли режиме видео и какой контейнер
    let currentFullscreenData = null; // { overlay, originalParent, originalNextSibling, video, wrapper }

    // ==================== HLS И АВТОЗАПУСК ====================
    const videoRegistry = new Map();

    function updateStatus(statusSpan, text, type = 'buffering') {
        if (!statusSpan) return;
        statusSpan.innerText = text;
        statusSpan.classList.remove('status-live', 'status-buffering', 'status-error');
        if (type === 'live') statusSpan.classList.add('status-live');
        else if (type === 'error') statusSpan.classList.add('status-error');
        else statusSpan.classList.add('status-buffering');
    }

    async function attemptPlayWithRetry(video, maxRetries = 5, baseDelay = 1000, statusSpan, spinner) {
        video.muted = true;
        for (let attempt = 1; attempt <= maxRetries; attempt++) {
            try {
                await video.play();
                updateStatus(statusSpan, "● LIVE", "live");
                if (spinner) spinner.style.display = 'none';
                return true;
            } catch (err) {
                if (attempt < maxRetries) {
                    const delay = baseDelay * attempt;
                    updateStatus(statusSpan, `Попытка ${attempt}/${maxRetries}...`, "buffering");
                    await new Promise(r => setTimeout(r, delay));
                } else {
                    updateStatus(statusSpan, "Автозапуск не удался", "error");
                    if (spinner) spinner.style.display = 'none';
                    return false;
                }
            }
        }
        return false;
    }

    function initHLS(video, streamUrl, statusSpan, spinner) {
        if (video.hlsInstance) {
            try { video.hlsInstance.destroy(); } catch(e) {}
            video.hlsInstance = null;
        }
        video.removeAttribute('src');
        
        const showSpinner = (show) => {
            if (spinner) spinner.style.display = show ? 'block' : 'none';
        };
        
        showSpinner(true);
        updateStatus(statusSpan, "Подключение...", "buffering");
        
        let playAttempted = false;
        const startPlayback = async () => {
            if (playAttempted) return;
            playAttempted = true;
            showSpinner(false);
            await attemptPlayWithRetry(video, 5, 1000, statusSpan, spinner);
        };
        
        if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = streamUrl;
            video.addEventListener('loadedmetadata', () => startPlayback());
            video.addEventListener('error', () => {
                if (!playAttempted) updateStatus(statusSpan, "Ошибка потока", "error");
                showSpinner(false);
            });
        } 
        else if (Hls.isSupported()) {
            const hls = new Hls({
                debug: false,
                enableWorker: true,
                lowLatencyMode: true,
                maxBufferLength: 30,
                manifestLoadingTimeOut: 10000,
                levelLoadingTimeOut: 8000,
            });
            video.hlsInstance = hls;
            hls.loadSource(streamUrl);
            hls.attachMedia(video);
            
            let manifestReady = false;
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                manifestReady = true;
                showSpinner(false);
                startPlayback();
            });
            
            hls.on(Hls.Events.ERROR, (event, data) => {
                if (data.fatal) {
                    if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
                        updateStatus(statusSpan, "Сеть", "error");
                        setTimeout(() => {
                            if (video.hlsInstance) {
                                video.hlsInstance.startLoad();
                                if (video.paused && !playAttempted) startPlayback();
                            }
                        }, 5000);
                    } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
                        updateStatus(statusSpan, "Медиа", "error");
                        hls.recoverMediaError();
                    }
                    showSpinner(false);
                } else {
                    if (!manifestReady) updateStatus(statusSpan, "Загрузка...", "buffering");
                }
            });
        } else {
            updateStatus(statusSpan, "HLS не поддержан", "error");
            showSpinner(false);
        }
        
        videoRegistry.set(video, { hls: video.hlsInstance, statusSpan, spinner, streamUrl });
    }

    // ==================== ПОЛНОЭКРАННЫЙ РЕЖИМ (БЕЗ ПЕРЕЗАПРОСА ВИДЕО) ====================
    function enterFullscreen(videoElement, title, originalWrapper) {
        // Если уже есть открытый полноэкранный режим, сначала закрываем его
        if (currentFullscreenData) {
            exitFullscreen();
        }
        
        // Сохраняем исходное положение видео
        const originalParent = originalWrapper.parentNode;
        const originalNextSibling = originalWrapper.nextSibling;
        
        // Создаём оверлей
        const overlay = document.createElement('div');
        overlay.className = 'fullscreen-overlay';
        
        const wrapper = document.createElement('div');
        wrapper.className = 'fullscreen-video-wrapper';
        
        // Изменяем стили видео для полноэкранного режима
        videoElement.classList.add('fullscreen-video');
        videoElement.style.position = 'relative';
        videoElement.style.width = '100%';
        videoElement.style.height = 'auto';
        videoElement.style.maxHeight = '100%';
        videoElement.style.objectFit = 'contain';
        
        // Убираем видео из исходного контейнера и помещаем в оверлей
        if (originalWrapper.parentNode) {
            originalWrapper.removeChild(videoElement);
        }
        wrapper.appendChild(videoElement);
        overlay.appendChild(wrapper);
        
        // Кнопка выхода
        const exitBtn = document.createElement('div');
        exitBtn.className = 'fullscreen-exit-btn';
        exitBtn.innerHTML = '✕';
        exitBtn.onclick = () => {
            exitFullscreen();
        };
        overlay.appendChild(exitBtn);
        
        // Заголовок
        const titleDiv = document.createElement('div');
        titleDiv.className = 'fullscreen-title';
        titleDiv.innerText = title;
        overlay.appendChild(titleDiv);
        
        // Подсказка
        const hint = document.createElement('div');
        hint.className = 'zoom-hint-full';
        hint.innerText = '🔍 Два пальца — масштабирование | Один палец — перемещение | ✕ — выход';
        overlay.appendChild(hint);
        
        document.body.appendChild(overlay);
        document.body.style.overflow = 'hidden';
        
        // Сохраняем данные для восстановления
        currentFullscreenData = {
            overlay: overlay,
            originalParent: originalParent,
            originalNextSibling: originalNextSibling,
            originalWrapper: originalWrapper,
            video: videoElement,
            originalPosition: videoElement.style.position,
            originalWidth: videoElement.style.width,
            originalHeight: videoElement.style.height,
            originalObjectFit: videoElement.style.objectFit,
            originalClass: videoElement.className
        };
        
        // ========== ЖЕСТЫ ДЛЯ МАСШТАБИРОВАНИЯ И ПЕРЕМЕЩЕНИЯ ==========
        let scale = 1;
        let translateX = 0;
        let translateY = 0;
        let initialDistance = 0;
        let initialScale = 1;
        let lastTouchX = 0;
        let lastTouchY = 0;
        let isPanning = false;
        
        function applyTransform() {
            videoElement.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
        }
        
        function resetTransform() {
            scale = 1;
            translateX = 0;
            translateY = 0;
            applyTransform();
        }
        
        videoElement.addEventListener('touchstart', onTouchStart);
        videoElement.addEventListener('touchmove', onTouchMove);
        videoElement.addEventListener('touchend', onTouchEnd);
        videoElement.addEventListener('dblclick', onDoubleClick);
        
        // Для мыши (десктоп)
        let mouseDown = false;
        let lastMouseX = 0, lastMouseY = 0;
        function onMouseDown(e) {
            if (scale > 1) {
                e.preventDefault();
                mouseDown = true;
                lastMouseX = e.clientX;
                lastMouseY = e.clientY;
                videoElement.style.cursor = 'grabbing';
            }
        }
        function onMouseMove(e) {
            if (mouseDown && scale > 1) {
                const deltaX = e.clientX - lastMouseX;
                const deltaY = e.clientY - lastMouseY;
                translateX += deltaX;
                translateY += deltaY;
                const maxX = (videoElement.clientWidth * (scale - 1)) / 2;
                const maxY = (videoElement.clientHeight * (scale - 1)) / 2;
                translateX = Math.min(Math.max(translateX, -maxX), maxX);
                translateY = Math.min(Math.max(translateY, -maxY), maxY);
                applyTransform();
                lastMouseX = e.clientX;
                lastMouseY = e.clientY;
            }
        }
        function onMouseUp() {
            mouseDown = false;
            videoElement.style.cursor = scale > 1 ? 'grab' : 'default';
        }
        
        videoElement.addEventListener('mousedown', onMouseDown);
        window.addEventListener('mousemove', onMouseMove);
        window.addEventListener('mouseup', onMouseUp);
        
        videoElement.style.cursor = scale > 1 ? 'grab' : 'default';
        
        function onTouchStart(e) {
            e.preventDefault();
            const touches = e.touches;
            if (touches.length === 2) {
                const dx = touches[0].clientX - touches[1].clientX;
                const dy = touches[0].clientY - touches[1].clientY;
                initialDistance = Math.hypot(dx, dy);
                initialScale = scale;
            } else if (touches.length === 1) {
                isPanning = true;
                lastTouchX = touches[0].clientX;
                lastTouchY = touches[0].clientY;
            }
        }
        
        function onTouchMove(e) {
            e.preventDefault();
            const touches = e.touches;
            if (touches.length === 2) {
                const dx = touches[0].clientX - touches[1].clientX;
                const dy = touches[0].clientY - touches[1].clientY;
                const distance = Math.hypot(dx, dy);
                if (initialDistance > 0) {
                    let newScale = initialScale * (distance / initialDistance);
                    newScale = Math.min(Math.max(newScale, 1), 5);
                    scale = newScale;
                    applyTransform();
                }
            } else if (touches.length === 1 && isPanning && scale > 1) {
                const deltaX = touches[0].clientX - lastTouchX;
                const deltaY = touches[0].clientY - lastTouchY;
                translateX += deltaX;
                translateY += deltaY;
                const maxX = (videoElement.clientWidth * (scale - 1)) / 2;
                const maxY = (videoElement.clientHeight * (scale - 1)) / 2;
                translateX = Math.min(Math.max(translateX, -maxX), maxX);
                translateY = Math.min(Math.max(translateY, -maxY), maxY);
                applyTransform();
                lastTouchX = touches[0].clientX;
                lastTouchY = touches[0].clientY;
            }
        }
        
        function onTouchEnd(e) {
            if (e.touches.length < 2) {
                initialDistance = 0;
            }
            if (e.touches.length === 0) {
                isPanning = false;
            }
        }
        
        function onDoubleClick(e) {
            e.preventDefault();
            resetTransform();
        }
        
        // Сохраняем обработчики для очистки
        videoElement._fsHandlers = {
            onTouchStart, onTouchMove, onTouchEnd, onDoubleClick,
            onMouseDown, onMouseMove, onMouseUp
        };
    }
    
    function exitFullscreen() {
        if (!currentFullscreenData) return;
        
        const data = currentFullscreenData;
        
        // Восстанавливаем видео в исходный контейнер
        const video = data.video;
        
        // Удаляем обработчики жестов
        if (video._fsHandlers) {
            video.removeEventListener('touchstart', video._fsHandlers.onTouchStart);
            video.removeEventListener('touchmove', video._fsHandlers.onTouchMove);
            video.removeEventListener('touchend', video._fsHandlers.onTouchEnd);
            video.removeEventListener('dblclick', video._fsHandlers.onDoubleClick);
            video.removeEventListener('mousedown', video._fsHandlers.onMouseDown);
            window.removeEventListener('mousemove', video._fsHandlers.onMouseMove);
            window.removeEventListener('mouseup', video._fsHandlers.onMouseUp);
            delete video._fsHandlers;
        }
        
        // Восстанавливаем исходные стили видео
        video.classList.remove('fullscreen-video');
        video.style.position = 'absolute';
        video.style.width = '100%';
        video.style.height = '100%';
        video.style.maxHeight = '';
        video.style.objectFit = 'cover';
        video.style.transform = '';
        video.style.cursor = '';
        
        // Возвращаем видео в исходный wrapper
        data.originalWrapper.appendChild(video);
        
        // Удаляем оверлей
        if (data.overlay && data.overlay.parentNode) {
            data.overlay.remove();
        }
        
        document.body.style.overflow = '';
        currentFullscreenData = null;
    }

    // ==================== СОЗДАНИЕ КАРТОЧКИ ====================
    function createCameraCard(streamUrl, idx) {
        const card = document.createElement('div');
        card.className = 'camera-card';
        card.dataset.idx = idx;
        
        const videoWrapper = document.createElement('div');
        videoWrapper.className = 'video-wrapper';
        
        const video = document.createElement('video');
        video.setAttribute('playsinline', 'true');
        video.setAttribute('preload', 'auto');
        video.setAttribute('autoplay', 'true');
        video.setAttribute('muted', 'true');
        video.controls = false;
        
        const spinner = document.createElement('div');
        spinner.className = 'loading-spinner';
        
        const statusSpan = document.createElement('div');
        statusSpan.className = 'video-status';
        statusSpan.innerText = "Старт...";
        
        videoWrapper.appendChild(video);
        videoWrapper.appendChild(spinner);
        videoWrapper.appendChild(statusSpan);
        
        const camInfo = document.createElement('div');
        camInfo.className = 'cam-info';
        const titleSpan = document.createElement('span');
        titleSpan.className = 'cam-title';
        const camTitle = getCameraTitle(streamUrl);
        titleSpan.innerText = camTitle;
        
        const fsBadge = document.createElement('span');
        fsBadge.className = 'fullscreen-badge';
        fsBadge.innerText = 'Во весь экран';
        
        camInfo.appendChild(titleSpan);
        camInfo.appendChild(fsBadge);
        card.appendChild(videoWrapper);
        card.appendChild(camInfo);
        
        initHLS(video, streamUrl, statusSpan, spinner);
        
        // Клик по карточке: открываем полноэкранный режим (без перезапроса видео)
        const onCardClick = (e) => {
            e.stopPropagation();
            enterFullscreen(video, camTitle, videoWrapper);
        };
        card.addEventListener('click', onCardClick);
        
        return card;
    }
    
    function renderGrid() {
        const grid = document.getElementById('cameraGrid');
        if (!grid) return;
        grid.innerHTML = '';
        STREAMS.forEach((url, i) => {
            const card = createCameraCard(url, i);
            grid.appendChild(card);
        });
    }
    
    // ==================== ЗАПУСК ====================
    document.addEventListener('DOMContentLoaded', () => {
        renderGrid();
    });
</script>
</body>
</html>
